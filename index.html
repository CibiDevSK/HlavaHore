    <style type="text/tailwindcss">
        :root {
            --flag-opacity: 0.35;
            --card-bg: rgba(255, 255, 255, 0.85)
        }
        body {
            @apply bg-slate-950 text-white overflow-hidden;
            font-family: 'Montserrat', sans-serif;
        }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; overflow: hidden; position: relative; }
        .screen.active { display: flex; }

        /* HOME SCREEN S OBRÁZKOM */
        #screen-menu {
            background-image: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.4)), 
                              url('https://i.postimg.cc/qqfwFQSQ/pozadie.jpg');

            background-position: center;
        }

        .main-title {
            font-size: 5rem;

            background-size: cover; background-position: center; opacity: var(--flag-opacity);
        }
        .slovak-flag-side {
            flex: 1; background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAs1dZ1ca2-bSSo9nCG_KPksLV-MbN6KL-GfGaLZ7OfT4Mbtd1oYVBYryef208ajEVbW1Zhjc7sl-ZopC2dUp7eQl3008nuKM4bYIT6kifG85zU-Wo01fm9utzNM7lsmBUGmS_lL751gXZAuBiNlEZkZvaU-m7uFgKuoDuvZQ7l_X9zhPv51MMon6ITMXFSXwdjFhvv2zh5ir5XB_1mwIuxTUxPeL6EFHiM3HB4D_2sGeGHr7kY0lrHSJGBbGQl4yTJ_UXYf9zwRq0);

            background-color: var(--card-bg);

        .category-card:hover { @apply -translate-y-2; background-color: rgba(255, 255, 255, 0.95); }
        
        .material-symbols-outlined {
            font-variation-settings: "FILL" 1, "wght" 600, "GRAD" 0, "opsz" 48;

        /* HERNÉ SLOVO - UPRAVENÉ ROZOSTUPY */

            { id: 'filmy', name: 'Filmy', words: ['Pelíšky', 'S tebou mě baví svět', 'Tri oriešky pre Popolušku', 'Perinbaba', 'Čert ví proč', 'Obecná škola', 'Kolja', 'Vesničko má středisková', 'Slunce, seno, erotika', 'Dědictví aneb Kurvahošigutntág', 'Marečku, podejte mi pero', 'Vrchní, prchni', 'Sneženky a machři', 'Profesionáli', 'Hoří, má panenko', 'Princezná so zlatou hviezdou', 'Susedia', 'Anděl Páně', 'Panelák', 'S čerty nejsou žerty', 'Jak vytrhnout velrybě stoličku', 'Jak dostat tatínka do polepšovny', 'Búrlivé víno', 'Arabela', 'Princezna ze mlejna', 'Byl jednou jeden král', 'Pyšná princezna', 'Šíleně smutná princezna', 'Čertova nevěsta', 'Krakonoš a lyžníci', 'Kuky se vrací', 'Tmavomodrý svet', 'Musíme si pomáhat', 'Želary', 'Bathory', 'Tajemství hradu v Karpatech', 'Babovřesky', 'Zítra vstanu a opařím se čajem', 'Čtyři vraždy stačí, drahoušku', 'Snowboarďáci', 'Gympl'] },
            { id: 'pantomima', name: 'Pantomíma', words: ['Dojiť kravu', 'Kosiť trávu', 'Loviť ryby', 'Okopávať zemiaky', 'Škrabať zemiaky', 'Tlačiť sa v preplnenom autobuse', 'Šoférovať v zápche', 'Lyžovať v Tatrách', 'Smažiť rezne', 'Zaváranie uhoriek', 'Škrabanie zamrznutého čelného skla', 'Pripraviť kapustnicu', 'Pečenie koláčov', 'Prať ručne', 'Piť pivo na ex', 'Hrať futbal', 'Hrať hokej na zamrznutom jazere', 'Jazdiť na bicykli', 'Hrať na gitare', 'Tancovať na diskotéke', 'Skákať na trampolíne', 'Čakať na meškajúci vlak', 'Telefónovať', 'Vysávať', 'Lov na huby v lese', 'Hrať na fujare', 'Zberať huby do košíka', 'Skákať do kaluže', 'Jazda na kolobežke', 'Naháňať psa'] }
        ];

        let state = { score: 0, timeLeft: 60, canAction: true, isGameRunning: false, gameLog: [], currentCategory: null, timer: null, countdownTimer: null, shuffledWords: [] };
        
        // Zvukový kontext
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function shuffleArray(array) {
            let cur = array.length, rand;
            while (cur != 0) { rand = Math.floor(Math.random() * cur); cur--; [array[cur], array[rand]] = [array[rand], array[cur]]; }
            return array;
        }

        function navigateTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectCategory(catId) {
            // Aktivácia audia (povinné pre Chrome/Safari)
            if (audio.state === 'suspended') {
                audio.resume();
            }
            
            const cat = DATA.find(c => c.id === catId);
            state.currentCategory = cat;
            state.shuffledWords = shuffleArray([...cat.words]);
            startCountdown();
        }

        function beep(f, d = 0.2) {
            try {
                const o = audio.createOscillator();
                const g = audio.createGain();
                o.connect(g);
                g.connect(audio.destination);
                o.frequency.value = f;
                g.gain.setValueAtTime(0.1, audio.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + d);
                o.start();
                o.stop(audio.currentTime + d);
            } catch(e) { console.error("Audio error:", e); }
        }

        function startCountdown() {
            navigateTo('screen-game');
            let c = 3;
            const el = document.getElementById('countdown-number');
            const overlay = document.getElementById('countdown-overlay');
            overlay.style.display = 'flex';
            el.innerText = c;
            
            state.countdownTimer = setInterval(() => {
                c--;
                if (c > 0) { 
                    el.innerText = c; 
                    beep(440, 0.1); // Pípnutie pri odpočte
                } 
                else { 
                    clearInterval(state.countdownTimer); 
                    overlay.style.display = 'none'; 
                    initGame(); 
                }
            }, 1000);
        }

        function initGame() {
            state.score = 0; state.timeLeft = 60; state.gameLog = []; state.isGameRunning = true; state.canAction = true;
            document.getElementById('current-score').innerText = `Body: 0`;
            document.getElementById('game-timer').innerText = `60`;
            nextWord(); runTimer();
            beep(880, 0.3); // Štartovací zvuk
        }

        function runTimer() {
            state.timer = setInterval(() => {
                state.timeLeft--;
                document.getElementById('game-timer').innerText = state.timeLeft;
                if (state.timeLeft <= 0) endGame();
            }, 1000);
        }

        function handleAction(type) {
            if (!state.isGameRunning || !state.canAction) return;
            state.canAction = false;
            const wordText = document.getElementById('game-word'), screen = document.getElementById('screen-game'), label = document.getElementById('action-label');
            
            if (type === 'correct') {
                state.score++; 
                state.gameLog.push({ w: wordText.innerText, s: 'ok' });
                screen.classList.add('flash-correct'); 
                label.innerText = "MÁM!";
                beep(1000, 0.2); // Vysoký tón
            } else {
                state.gameLog.push({ w: wordText.innerText, s: 'skip' });
                screen.classList.add('flash-skip'); 
                label.innerText = "SKIP";
                beep(200, 0.3); // Hlboký tón
            }
            
            label.style.opacity = 1;
            document.getElementById('current-score').innerText = `Body: ${state.score}`;
            
            setTimeout(() => {
                screen.classList.remove('flash-correct', 'flash-skip');
                label.style.opacity = 0; 
                nextWord(); 
                state.canAction = true;
            }, 400);
        }

        function nextWord() {
    if (state.shuffledWords.length === 0) {
        state.shuffledWords = shuffleArray([...state.currentCategory.words]);
    }
    const currentWord = state.shuffledWords.pop() || "ŽIADNE DÁTA";
    const wordEl = document.getElementById('game-word');

    // NOVÝ VÝPOČET: Písmo určíme podľa dĺžky slova (čím dlhšie, tým menšie)
    // 90 / dĺžka slova nám dáva dynamické 'vw' s bezpečnou rezervou
    let length = currentWord.length;
    let sizeValue = 90 / length; 

    // Nastavíme limity (Strop a Podlaha)
    if (sizeValue > 15) sizeValue = 15; // Maximálna veľkosť pre krátke slová (napr. VÁH)
    if (sizeValue < 6) sizeValue = 6;    // Minimálna veľkosť pre dlhé vety

    let fontSize = sizeValue + "vw";
    let letterSpacing = "0.05em";

    // Jemné doladenie pre veľmi dlhé slová
    if (length > 12) {
        letterSpacing = "0em"; // Zrušíme medzery medzi písmenami pri dlhých slovách
    }

    // Aplikujeme štýly
    wordEl.style.fontSize = fontSize;
    wordEl.style.letterSpacing = letterSpacing;
    wordEl.innerText = currentWord;
}

        function quitGame() {
            clearInterval(state.timer); 
            clearInterval(state.countdownTimer);
            state.isGameRunning = false;
            document.getElementById('countdown-overlay').style.display = 'none';
            navigateTo('screen-categories');
        }

        function endGame() {
            state.isGameRunning = false; 
            clearInterval(state.timer); 
            navigateTo('screen-results');
            document.getElementById('final-score').innerText = state.score;
            const res = document.getElementById('results-list'); res.innerHTML = '';
            state.gameLog.forEach(i => {
                const d = document.createElement('div');
                d.className = `flex justify-between p-4 rounded-2xl font-bold uppercase italic ${i.s === 'ok' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`;
                d.innerHTML = `<span>${i.w}</span><span>${i.s === 'ok' ? '✓' : '✕'}</span>`;
                res.appendChild(d);
            });
        }
    </script>
</body>
</html>
