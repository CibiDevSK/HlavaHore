<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag pre fixný zoom a využitie celého displeja -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HLAVA HORE - ČeskoSlovensko</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { "sans": ["Montserrat", "sans-serif"] },
                    colors: { "cz-red": "#D71920", "cz-blue": "#11457E" }
                },
            },
        }
    </script>

    <style type="text/tailwindcss">
        /* Základné nastavenie pre mobil - zákaz scrollovania celého tela */
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            @apply bg-slate-950 text-white overflow-hidden font-sans;
        }

        .screen { 
            display: none; height: 100vh; width: 100vw; 
            flex-direction: column; overflow: hidden; position: relative; 
        }
        .screen.active { display: flex; }

        /* OPRAVENÉ POZADIE (Width/Height 100% pre Landscape) */
        #screen-menu { 
            background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.5)), 
                              url('https://i.postimg.cc/qqfwFQSQ/pozadie.jpg'); 
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
        }

        /* ŠKÁLOVANIE TITULKY (Používame vh, aby sa nezrezala na nízkom displeji) */
        .main-title { 
            font-size: 14vh; 
            font-weight: 900; 
            @apply uppercase leading-none text-center; 
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.8), 4px 4px 0px #1e3a8a, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; 
        }

        /* GRID KATEGÓRIÍ - Kompaktnejší pre Landscape */
        .category-card { 
            @apply flex flex-col items-center justify-center p-2 backdrop-blur-md transition-all duration-300 cursor-pointer text-center relative border-[4px]; 
            background-color: rgba(255, 255, 255, 0.85); 
            border-radius: 1.5rem;
            height: 28vh; /* Fixná výška, aby sa 2 rady zmestili do obrazovky */
        }
        .material-symbols-outlined { 
            font-variation-settings: "FILL" 1, "wght" 600; 
            font-size: 8vh !important; /* Ikona reaguje na výšku displeja */
        }

        /* OVERLAY PRE ORIENTÁCIU */
        #orientation-overlay { 
            @apply fixed inset-0 z-[200] bg-slate-900 flex flex-col items-center justify-center p-10 text-center; 
            display: none; 
        }
        @media (orientation: portrait) { 
            #orientation-overlay { display: flex; } 
            #app { display: none; } 
        }

        .flash-correct { background-color: #10b981 !important; }
        .flash-skip { background-color: #ef4444 !important; }
        .tap-zone { position: absolute; top: 0; height: 100%; width: 50%; z-index: 40; }
    </style>
</head>
<body>

    <!-- 0. OVERLAY: OTOČTE MOBIL -->
    <div id="orientation-overlay">
        <span class="material-symbols-outlined text-7xl text-cz-blue animate-bounce">screen_rotation</span>
        <h2 class="text-3xl font-black mt-4 uppercase italic text-white">Otočte mobil</h2>
        <p class="text-slate-400 mt-2 font-bold uppercase tracking-widest text-xs">Pre hranie potrebujete režim na šírku (Landscape)</p>
    </div>

    <div id="app">

        <!-- 1. SCREEN: HOME -->
        <section id="screen-menu" class="screen active items-center justify-center p-4">
            <div class="mb-6">
                <h1 class="main-title">HLAVA<br>HORE</h1>
                <p class="text-blue-200 text-lg font-bold tracking-[0.4em] uppercase italic drop-shadow-2xl">SK / CZ Edícia</p>
            </div>
            <button onclick="navigateTo('screen-categories')" class="bg-cz-blue hover:bg-blue-500 text-white px-12 py-4 rounded-[2rem] text-3xl font-black shadow-2xl active:scale-90 transition-transform uppercase italic border-b-4 border-blue-900">
                HRAŤ
            </button>
        </section>

        <!-- 2. SCREEN: CATEGORIES -->
        <section id="screen-categories" class="screen bg-slate-900">
            <div class="flex-none flex items-center justify-between px-6 py-2 border-b border-white/10">
                <h2 class="text-xl font-black uppercase italic tracking-tighter">Vyberte si kategóriu</h2>
                <button onclick="navigateTo('screen-menu')" class="text-[10px] font-bold uppercase tracking-widest px-4 py-1 border border-white/20 rounded-full">Späť</button>
            </div>

            <main class="flex-grow p-4 overflow-hidden">
                <div class="grid grid-cols-3 gap-4 h-full">
                    <!-- Geografia -->
                    <button onclick="selectCategory('geografia')" class="category-card border-cz-blue text-gray-900">
                        <span class="material-symbols-outlined text-cz-blue">terrain</span>
                        <span class="text-xs font-black uppercase tracking-tighter">Geografia</span>
                    </button>
                    <!-- Šport -->
                    <button onclick="selectCategory('sportovci')" class="category-card border-cz-red text-gray-900">
                        <span class="material-symbols-outlined text-cz-red">sports_hockey</span>
                        <span class="text-xs font-black uppercase tracking-tighter">Šport</span>
                    </button>
                    <!-- Gastro -->
                    <button onclick="selectCategory('gastro')" class="category-card border-cz-blue text-gray-900">
                        <span class="material-symbols-outlined text-cz-blue">sports_bar</span>
                        <span class="text-xs font-black uppercase tracking-tighter">Gastro</span>
                    </button>
                    <!-- Filmy -->
                    <button onclick="selectCategory('filmy')" class="category-card border-cz-red text-gray-900">
                        <span class="material-symbols-outlined text-cz-red">castle</span>
                        <span class="text-xs font-black uppercase tracking-tighter">Filmy</span>
                    </button>
                    <!-- Showbiz -->
                    <button onclick="selectCategory('showbiz')" class="category-card border-cz-blue text-gray-900">
                        <span class="material-symbols-outlined text-cz-blue">star</span>
                        <span class="text-xs font-black uppercase tracking-tighter">Celebrity</span>
                    </button>
                    <!-- Pantomíma -->
                    <button onclick="selectCategory('pantomima')" class="category-card border-cz-red text-gray-900">
                        <span class="material-symbols-outlined text-cz-red">theater_comedy</span>
                        <span class="text-xs font-black uppercase tracking-tighter">Pantomíma</span>
                    </button>
                </div>
            </main>
        </section>

        <!-- 3. SCREEN: GAME -->
        <section id="screen-game" class="screen items-center justify-center bg-black">
            <div class="absolute bottom-6 left-0 right-0 flex justify-between px-10 opacity-30 font-black uppercase text-[10px] pointer-events-none z-20">
                <span>← SKIP (VĽAVO)</span>
                <span>MÁM (VPRAVO) →</span>
            </div>
            <button onclick="quitGame()" class="absolute top-4 left-6 z-[110] bg-white/10 text-white px-4 py-1 rounded-full font-bold text-[10px] uppercase border border-white/20">✕ Koniec</button>
            <div id="countdown-overlay" class="absolute inset-0 bg-slate-950 z-[100] flex items-center justify-center">
                <div id="countdown-number" class="text-[40vh] font-black text-cz-blue italic leading-none">3</div>
            </div>
            <div class="tap-zone left-0" onclick="handleAction('skip')"></div>
            <div class="tap-zone right-0" onclick="handleAction('correct')" style="right:0"></div>
            <div class="absolute top-4 right-10 flex flex-col items-end font-black z-20 pointer-events-none text-right">
                <div id="game-timer" class="text-5xl font-mono text-slate-500 leading-none">60</div>
                <div id="current-score" class="text-xl text-cz-blue italic uppercase">Body: 0</div>
            </div>
            <div id="game-word" class="font-black uppercase px-10 z-10 leading-tight text-center">---</div>
            <div id="action-label" class="absolute bottom-16 text-white font-black uppercase tracking-[0.5em] text-3xl opacity-0 transition-opacity duration-100">---</div>
        </section>

        <!-- 4. SCREEN: RESULTS -->
        <section id="screen-results" class="screen bg-slate-950 flex flex-col">
            <div class="flex-none text-center pt-6 pb-2">
                <h2 class="text-slate-500 uppercase font-black text-xs tracking-widest leading-none">Kolo skončilo</h2>
                <div id="final-score" class="text-7xl font-black my-1 italic text-white leading-none">0</div>
                <p class="text-slate-400 uppercase font-bold text-[10px] tracking-widest border-b border-white/5 pb-2 mx-20">Vaše skóre</p>
            </div>
            <div class="flex-grow overflow-y-auto px-6 py-2 scroll-smooth">
                <div id="results-list" class="w-full max-w-sm mx-auto space-y-1 py-2 text-white font-bold uppercase italic text-[11px]"></div>
            </div>
            <div class="flex-none p-4 bg-slate-900 border-t border-white/10 shadow-[0_-20px_30px_rgba(2,6,23,1)]">
                <div class="w-full max-w-xs mx-auto flex flex-col gap-2">
                    <button onclick="navigateTo('screen-categories')" class="bg-cz-blue w-full py-4 rounded-[1.5rem] font-black text-lg uppercase italic shadow-xl text-white">Hrať znova</button>
                    <button onclick="navigateTo('screen-menu')" class="text-slate-500 font-bold uppercase text-[10px] tracking-widest py-1 text-center w-full">Domov</button>
                </div>
            </div>
        </section>

    </div>

    <script>
        const DATA = [
            { id: 'geografia', name: 'Geografia', words: [Vysoké Tatry', 'Nízke Tatry', 'Slovenský raj', 'Pieniny', 'Štrbské pleso', 'Poprad', 'Košice', 'Trenčín', 'Nitra', 'Žilina', 'Liptovská Mara', 'Dobšinská ľadová jaskyňa', 'Čičmany', 'Vlkolínec', 'Zemplínska šírava', 'Bardejov', 'Súľovské skaly', 'Poloniny', 'Strečno (hrad)', 'Demänovská jaskyňa slobody', 'Brno', 'Ostrava', 'Plzeň', 'Olomouc', 'Český Krumlov', 'Kutná Hora', 'Lednice', 'Praděd', 'Šumava', 'Krkonoše', 'Morava (řeka)', 'Lipno', 'Adršpašské skály', 'Karlův most', 'Ještěd', 'Pálava', 'Hluboká nad Vltavou', 'České Švýcarsko', 'Slezsko', 'Konopiště (zámek)', 'Mikulov', 'Beskydy', 'Ústí nad Labem'] },
            { id: 'sportovci', name: 'Šport', words: ['Peter Sagan', 'Petra Vlhová', 'Zdeno Chára', 'Marek Hamšík', 'Marián Hossa', 'Pavol Demitra', 'Juraj Slafkovský', 'Martin Škrtel', 'Martina Moravcová', 'Dominika Cibulková', 'Matej Tóth', 'Ján Volko', 'Miroslav Šatan', 'Peter Bondra', 'Attila Végh', 'Stanislav Lobotka', 'Vladimír Weiss ml.', 'Róbert Vittek', 'Veronika Zuzulová', 'Richard Lintner', 'Ladislav Nagy', 'Žigmund Pálffy', 'Andrej Sekera', 'Ľubomír Višňovský', 'Michal Martikán', 'Elena Kaliská', 'Anastasia Kuzminová', 'Richard Varga', 'Filip Polášek', 'Štefan Svitko', 'Bratia Šťastní', 'Jozef Golonka', 'Vladimír Dzurilla', 'Ján Kozák st.', 'Jozef Pribilinec', 'Jaromír Jágr', 'Petr Čech', 'Pavel Nedvěd', 'Emil Zátopek', 'Dominik Hašek', 'Jan Železný', 'Roman Šebrle', 'Ester Ledecká', 'Petra Kvitová', 'Karolína Plíšková', 'Barbora Krejčíková', 'Tomáš Berdych', 'Tomáš Rosický', 'Patrik Schick', 'Gabriela Soukalová', 'Kateřina Neumannová', 'Lukáš Krpálek', 'Martina Sáblíková', 'Jiří Procházka', 'Karlos Vémola', 'Radek Štěpánek', 'Lucie Šafářová', 'Jaroslav Kulhavý', 'David Pastrňák', 'Patrik Eliáš', 'Tomáš Hertl', 'Barbora Špotáková', 'Zdeněk Štybar', 'Ondřej Moravec', 'Vladimír Růžička', 'Jan Koller', 'Milan Baroš', 'Ivan Lendl', 'Martina Navrátilová', 'Věra Čáslavská', 'Antonín Panenka', 'Václav Nedomanský', 'Jarmila Kratochvílová', 'Josef Masopust'] },
            { id: 'showbiz', name: 'Celebrity', words: ['Adela Banášová', 'Štefan Hríb', 'Sajfa', 'Juraj Kemka', 'Rytmus', 'Ego', 'Separ', 'Kali', 'Gogo', 'Majk Spirit', 'Elán', 'Peter Cmorik', 'Tina', 'Kristína', 'Richard Müller', 'No Name', 'IMT Smile', 'H16', 'Milan Lasica', 'Július Satinský', 'Marián Labuda', 'Karol Duchoň', 'INÉ KAFE', 'Zuzana Smatanová', 'Emma Drobná', 'Peter Lipa', 'Miro Žbirka', 'Peter Nagy', 'Gleb', 'Marika Gombitová', 'Jozef Kroner', 'Tatiana Pauhofová', 'Maroš Kramár', 'Lucie Bílá', 'Helena Vondráčková', 'Michal David', 'Ewa Farna', 'Petr Muk', 'Petr Kolář', 'Tomáš Klus', 'Xindl X', 'Michal Hrůza', 'Richard Krajčo', 'Michal Malátný', 'Jan Kraus', 'Leoš Mareš', 'Karel Šíp', 'Pavel Zuna', 'Tereza Pergnerová', 'Daniel Stach', 'Adéla Gondíková', 'Jakub Prachař', 'Jiřina Bohdalová', 'Oldřich Kaiser', 'Bolek Polívka', 'Ivan Trojan', 'Tatiana Vilhelmová', 'Jiří Bartoška', 'Pavel Liška', 'Iva Janžurová', 'Václav Postránecký', 'Jiří Langmajer'] },
            { id: 'gastro', name: 'Gastro', words: ['Bryndzové halušky', 'Kapustnica', 'Segedínsky guláš', 'Guláš', 'Sviečková na smotane', 'Vepřo-knedlo-zelo', 'Vyprážaný syr', 'Rezeň', 'Zemiakový šalát', 'Pirohy', 'Lokše', 'Strapačky', 'Parené buchty', 'Šúľance s makom', 'Palacinky', 'Langoš', 'Trdelník', 'Knedlíky', 'Bramboráky', 'Halušky s kapustou', 'Držková polievka', 'Cesnačka', 'Kulajda', 'Fazuľová polievka', 'Šošovicová polievka', 'Pečená kačica', 'Moravský vrabec', 'Medovníky', 'Bublanina', 'Bábovka', 'Vianočka', 'Makovník', 'Orechovník', 'Kremrole', 'Veterník', 'Špička', 'Punčový rez', 'Laskonka', 'Koláče', 'Žemľovka', 'Kofola', 'Vinea', 'Tatratea', 'Slivovica', 'Becherovka', 'Demänovka', 'Borovička', 'Plzeň', 'Fernet', 'Horalky', 'Kávenky', 'Mila', 'Margot', 'Lentilky', 'Kofila', 'Studentská pečeť', 'JoJo cukríky', 'Sójový suk', 'Deli tyčinka', 'Pikao'] },
            { id: 'filmy', name: 'Filmy', words: ['Pelíšky', 'S tebou mě baví svět', 'Tri oriešky pre Popolušku', 'Perinbaba', 'Čert ví proč', 'Obecná škola', 'Kolja', 'Vesničko má středisková', 'Slunce, seno, erotika', 'Dědictví aneb Kurvahošigutntág', 'Marečku, podejte mi pero', 'Vrchní, prchni', 'Sneženky a machři', 'Profesionáli', 'Hoří, má panenko', 'Princezná so zlatou hviezdou', 'Susedia', 'Anděl Páně', 'Panelák', 'S čerty nejsou žerty', 'Jak vytrhnout velrybě stoličku', 'Jak dostat tatínka do polepšovny', 'Búrlivé víno', 'Arabela', 'Princezna ze mlejna', 'Byl jednou jeden král', 'Pyšná princezna', 'Šíleně smutná princezna', 'Čertova nevěsta', 'Krakonoš a lyžníci', 'Kuky se vrací', 'Tmavomodrý svet', 'Musíme si pomáhat', 'Želary', 'Bathory', 'Tajemství hradu v Karpatech', 'Babovřesky', 'Zítra vstanu a opařím se čajem', 'Čtyři vraždy stačí, drahoušku', 'Snowboarďáci', 'Gympl'] },
            { id: 'pantomima', name: 'Pantomíma', words: ['Dojiť kravu', 'Kosiť trávu', 'Loviť ryby', 'Okopávať zemiaky', 'Škrabať zemiaky', 'Tlačiť sa v preplnenom autobuse', 'Šoférovať v zápche', 'Lyžovať v Tatrách', 'Smažiť rezne', 'Zaváranie uhoriek', 'Škrabanie zamrznutého čelného skla', 'Pripraviť kapustnicu', 'Pečenie koláčov', 'Prať ručne', 'Piť pivo na ex', 'Hrať futbal', 'Hrať hokej na zamrznutom jazere', 'Jazdiť na bicykli', 'Hrať na gitare', 'Tancovať na diskotéke', 'Skákať na trampolíne', 'Čakať na meškajúci vlak', 'Telefónovať', 'Vysávať', 'Lov na huby v lese', 'Hrať na fujare', 'Zberať huby do košíka', 'Skákať do kaluže', 'Jazda na kolobežke', 'Naháňať psa'] }
        ];

        let state = { score: 0, timeLeft: 60, canAction: true, isGameRunning: false, gameLog: [], currentCategory: null, timer: null, countdownTimer: null, shuffledWords: [] };
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function shuffleArray(array) {
            let cur = array.length, rand;
            while (cur != 0) { rand = Math.floor(Math.random() * cur); cur--; [array[cur], array[rand]] = [array[rand], array[cur]]; }
            return array;
        }

        function navigateTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectCategory(catId) {
            if (audio.state === 'suspended') audio.resume();
            const cat = DATA.find(c => c.id === catId);
            state.currentCategory = cat;
            state.shuffledWords = shuffleArray([...cat.words]);
            startCountdown();
        }

        function beep(f, d = 0.2) {
            try { const o = audio.createOscillator(), g = audio.createGain(); o.connect(g); g.connect(audio.destination); o.frequency.value = f; g.gain.setValueAtTime(0.1, audio.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + d); o.start(); o.stop(audio.currentTime + d); } catch(e) {}
        }

        function startCountdown() {
            navigateTo('screen-game');
            let c = 3;
            const el = document.getElementById('countdown-number'), overlay = document.getElementById('countdown-overlay');
            overlay.style.display = 'flex'; el.innerText = c;
            state.countdownTimer = setInterval(() => {
                c--; if (c > 0) { el.innerText = c; beep(440, 0.1); } 
                else { clearInterval(state.countdownTimer); overlay.style.display = 'none'; initGame(); }
            }, 1000);
        }

        function initGame() {
            state.score = 0; state.timeLeft = 60; state.gameLog = []; state.isGameRunning = true; state.canAction = true;
            document.getElementById('current-score').innerText = `Body: 0`; document.getElementById('game-timer').innerText = `60`;
            nextWord(); runTimer(); beep(880, 0.3);
        }

        function runTimer() {
            state.timer = setInterval(() => {
                state.timeLeft--; document.getElementById('game-timer').innerText = state.timeLeft;
                if (state.timeLeft <= 0) endGame();
            }, 1000);
        }

        function handleAction(type) {
            if (!state.isGameRunning || !state.canAction) return;
            state.canAction = false;
            const wordText = document.getElementById('game-word'), screen = document.getElementById('screen-game'), label = document.getElementById('action-label');
            if (type === 'correct') {
                state.score++; state.gameLog.push({ w: wordText.innerText, s: 'ok' });
                screen.classList.add('flash-correct'); label.innerText = "MÁM!"; beep(1000, 0.2);
            } else {
                state.gameLog.push({ w: wordText.innerText, s: 'skip' });
                screen.classList.add('flash-skip'); label.innerText = "SKIP"; beep(200, 0.3);
            }
            label.style.opacity = 1; document.getElementById('current-score').innerText = `Body: ${state.score}`;
            setTimeout(() => { screen.classList.remove('flash-correct', 'flash-skip'); label.style.opacity = 0; nextWord(); state.canAction = true; }, 400);
        }

        function nextWord() {
            if (state.shuffledWords.length === 0) state.shuffledWords = shuffleArray([...state.currentCategory.words]);
            const currentWord = state.shuffledWords.pop() || "---";
            const wordEl = document.getElementById('game-word');
            let size = 90 / currentWord.length;
            if (size > 14) size = 14; if (size < 5) size = 5;
            wordEl.style.fontSize = size + "vw";
            wordEl.innerText = currentWord;
        }

        function quitGame() { clearInterval(state.timer); clearInterval(state.countdownTimer); state.isGameRunning = false; document.getElementById('countdown-overlay').style.display = 'none'; navigateTo('screen-categories'); }

        function endGame() {
            state.isGameRunning = false; clearInterval(state.timer); navigateTo('screen-results');
            document.getElementById('final-score').innerText = state.score;
            const res = document.getElementById('results-list'); res.innerHTML = '';
            state.gameLog.forEach(i => {
                const d = document.createElement('div');
                d.className = `flex justify-between p-2 rounded-xl border border-white/5 ${i.s === 'ok' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`;
                d.innerHTML = `<span>${i.w}</span><span>${i.s === 'ok' ? '✓' : '✕'}</span>`;
                res.appendChild(d);
            });
        }
    </script>
</body>
</html>
